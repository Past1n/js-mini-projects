<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Aim Trainer</title>
</head>
<body>
    <div class="screen">
        <h1>Aim <span class="primary">Trainer</span></h1>
        <a href="#" class="start-btn" id="start">Start Game</a>
        <div class="footer">
            <a href="../../index.html" class="back-link">← Back to Projects</a>
        </div>
    </div>
    <div class="screen">
        <h1>Select Duration</h1>
        <ul class="time-list" id="time-list">
            <li><button class="time-btn" data-time="10">10 sec</button></li>
            <li><button class="time-btn" data-time="20">20 sec</button></li>
            <li><button class="time-btn" data-time="30">30 sec</button></li>
            <li><button class="time-btn" data-time="60">60 sec</button></li>
        </ul>
    </div>
    <div class="screen">
        <h3>Time: <span id="time">00:00</span></h3>
        <div class="board" id="board"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
